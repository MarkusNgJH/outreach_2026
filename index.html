<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#f6f4ff;--card:#ffffff;--ink:#221c3a;--muted:#8b86a6;--line:#ece9ff;
 --grape:#6c5ce7;--coral:#ff6b6b;--teal:#2ec4b6;--yellow:#ffd166;--soft:#f3f1ff;
 --shadow:0 24px 50px -26px rgba(108,92,231,.45)}
html,body{min-height:100%}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);
 background:radial-gradient(40% 30% at 12% 8%,rgba(108,92,231,.10),transparent 70%),
  radial-gradient(38% 28% at 88% 4%,rgba(255,107,107,.10),transparent 70%),
  radial-gradient(45% 30% at 80% 100%,rgba(46,196,182,.10),transparent 70%),
  linear-gradient(180deg,#f7f5ff,#f1eeff);
 background-attachment:fixed;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
 padding:clamp(16px,4vw,46px);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.stage{width:100%;max-width:560px}
.panel{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);
 border-radius:28px;box-shadow:var(--shadow);padding:clamp(22px,5vw,40px);
 transition:opacity .24s ease,transform .24s ease}
.panel.leaving{opacity:0;transform:translateY(-12px)}
.panel::after{content:"";position:absolute;top:0;left:0;right:0;height:5px;
 background:linear-gradient(90deg,var(--grape),var(--coral),var(--yellow))}
.fadein{animation:fade .45s cubic-bezier(.2,.7,.3,1)}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.footnote{margin-top:22px;text-align:center;font-size:.8rem;color:var(--muted)}
.btn{appearance:none;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.02rem;
 color:#fff;background:var(--grape);border:none;border-radius:16px;padding:15px 32px;
 box-shadow:0 12px 24px -10px rgba(108,92,231,.7);transition:transform .14s,box-shadow .14s,filter .14s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 18px 30px -10px rgba(108,92,231,.75)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--soft);color:var(--grape);box-shadow:none}
.btn.ghost:hover{background:#eae6ff}
.actions{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.emblem{width:84px;height:84px;border-radius:24px;display:grid;place-items:center;font-size:40px;
 background:var(--soft);box-shadow:0 10px 24px -12px rgba(108,92,231,.5)}
.eyebrow{font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
 font-size:.74rem;color:var(--grape)}
h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(2rem,7vw,2.8rem);line-height:1.08;margin-top:8px;color:var(--ink)}
h1 .glow{display:block;color:var(--grape)}
.lede{margin-top:16px;font-size:1.04rem;color:#5f5a73;max-width:46ch}
.fine{margin-top:18px;font-size:.85rem;color:var(--muted)}
.qhero{display:block;width:auto;aspect-ratio:16/9;object-fit:cover;background:#efeaff;
 margin:calc(-1 * clamp(22px,5vw,40px)) calc(-1 * clamp(22px,5vw,40px)) 18px}
@media(max-width:520px){.qhero{margin:-22px -18px 16px}}
.topbar{display:flex;justify-content:space-between;align-items:center;
 font-family:'Poppins',sans-serif;font-weight:700;font-size:.76rem;color:var(--grape);margin-bottom:9px}
.track{height:10px;background:var(--soft);border-radius:99px;position:relative;margin-bottom:8px}
.track .fill{position:absolute;left:0;top:0;height:100%;border-radius:99px;
 background:linear-gradient(90deg,var(--grape),var(--coral));transition:width .5s cubic-bezier(.4,0,.2,1)}
.qart{display:flex;justify-content:center;margin:6px 0 12px}
.qart .frame{width:120px;height:120px;display:grid;place-items:center;border-radius:22px;
 background:var(--soft);box-shadow:inset 0 0 0 1px var(--line);animation:float 4s ease-in-out infinite}
.qart svg{width:96px;height:96px;filter:drop-shadow(0 4px 6px rgba(80,60,160,.25))}
.qart rect{shape-rendering:crispEdges}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.qphoto{width:120px;height:120px;object-fit:cover;border-radius:20px}
.qnum{font-family:'Poppins',sans-serif;font-weight:700;color:var(--grape);font-size:.92rem;margin-bottom:6px}
.question{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(1.2rem,4vw,1.55rem);
 line-height:1.25;color:var(--ink);margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;text-align:left;cursor:pointer;font-family:'Inter',sans-serif;
 font-weight:600;font-size:1rem;color:#3a3450;background:#fff;border:2px solid var(--line);border-radius:16px;
 padding:14px 16px;opacity:0;transform:translateY(8px);animation:rise .45s forwards;
 transition:transform .13s,box-shadow .16s,border-color .16s}
.opt:hover{transform:translateY(-2px);box-shadow:0 10px 22px -12px rgba(108,92,231,.5)}
.opt:active{transform:scale(.985)}
.opt .key{flex:0 0 auto;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
 font-family:'Poppins',sans-serif;font-weight:800;font-size:.82rem;background:var(--soft);color:var(--grape)}
.opt:nth-child(1):hover{border-color:var(--coral)} .opt:nth-child(1) .key{background:#ffe6e6;color:#ff5252}
.opt:nth-child(2):hover{border-color:var(--teal)} .opt:nth-child(2) .key{background:#dbf6f3;color:#1ba99b}
.opt:nth-child(3):hover{border-color:var(--yellow)} .opt:nth-child(3) .key{background:#fff2d6;color:#d9a316}
.opt:nth-child(4):hover{border-color:var(--grape)} .opt:nth-child(4) .key{background:#ece9ff;color:var(--grape)}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.result{text-align:center}
.result .emblem{width:96px;height:96px;border-radius:50%;margin:4px auto 12px;font-size:46px}
.verdict{font-family:'Poppins',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.76rem;color:var(--muted)}
.piece-name{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(1.7rem,6vw,2.4rem);line-height:1.05;color:var(--ink);margin-top:4px}
.piece-title{font-family:'Poppins',sans-serif;font-weight:700;font-style:italic;color:var(--grape);font-size:1.18rem;margin-top:2px}
.rarity{display:inline-block;margin-top:14px;padding:8px 16px;border-radius:99px;font-family:'Poppins',sans-serif;font-weight:800;font-size:.85rem;background:#ffe6e6;color:#e0495b}
.traits{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0 2px}
.trait{font-size:.84rem;font-weight:600;color:#5f5a73;border-radius:99px;padding:6px 14px;background:var(--soft)}
.block{text-align:left;border-top:1px solid var(--line);margin-top:22px;padding-top:18px}
.block h4{font-family:'Poppins',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.72rem;color:var(--grape);margin-bottom:6px}
.block p{color:#4a4560;font-size:1.02rem}
.verse{font-style:italic;color:var(--ink);font-size:1.08rem;line-height:1.4}
.verse cite{display:block;font-style:normal;font-family:'Poppins',sans-serif;font-weight:700;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--grape);margin-top:8px}
.pairs{display:flex;gap:10px;flex-wrap:wrap}
.pair{font-size:.9rem;font-weight:600;color:#3a3450;border-radius:12px;padding:8px 13px;background:var(--soft)}
.share{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.sbtn{display:inline-flex;align-items:center;gap:7px;appearance:none;cursor:pointer;font-family:'Poppins',sans-serif;
 font-weight:700;font-size:.9rem;color:var(--grape);background:var(--soft);border:none;border-radius:14px;
 padding:11px 16px;transition:transform .14s,background .16s}
.sbtn:hover{transform:translateY(-2px);background:#e8e3ff}
.sbtn svg{width:16px;height:16px;display:block}
.sbtn.wa{color:#1ba85a;background:#e3f7ea}.sbtn.wa:hover{background:#d2f1dd}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--grape);

@media(max-width:520px){.panel{padding:22px 18px;border-radius:22px}.sbtn{flex:1 1 auto;justify-content:center;min-width:120px}}

</head>

const PHOTOS={0:Q1_PHOTO,1:Q2_PHOTO};

function buildSprite(rows){
  let cells="";
  for(let y=0;y<rows.length;y++){
    for(let x=0;x<rows[y].length;x++){
      const col = PAL[rows[y][x]];
      if(col) cells+=`<rect x="${x}" y="${y}" width="1.02" height="1.02" fill="${col}"/>`;
    }
  }
  return `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${cells}</svg>`;
}

let state;
function reset(){ state = { i:0, scores:{belt:0,breastplate:0,shoes:0,shield:0,helmet:0,sword:0}, first:{} }; }
const panel = document.getElementById('panel');
const KEYS = ['A','B','C','D'];

function welcome(){
  panel.className='panel fadein';
  panel.innerHTML = `
    <div class="emblem">⚔️</div>
    <div class="eyebrow" style="margin-top:18px">A Spiritual Personality Quiz</div>
    <h1>Which piece of the<span class="glow">Armour of God</span>are you?</h1>
    <p class="lede">Ten everyday moments from a campus day. Answer on instinct, and discover which part of the armour from Ephesians 6 you wear most naturally — and how it shapes the way you live out your faith.</p>
    <div class="actions">
      <button class="btn" onclick="start()">Begin the quiz</button>
    </div>
    <p class="fine">Six possible results · takes about two minutes · nothing saved, nothing shared</p>`;
}

function start(){ reset(); swap(render); }

function swap(fn){
  panel.classList.add('leaving');
  setTimeout(()=>{ panel.classList.remove('leaving'); fn(); }, 200);
}

function render(){
  const item = QUESTIONS[state.i];
  const pct = Math.round((state.i)/QUESTIONS.length*100);
  panel.className='panel fadein';
  const photo = PHOTOS[state.i];
  const hero = photo ? `<img class="qhero" src="${photo}" alt="Question illustration">` : '';
  const art  = photo ? '' : `<div class="qart"><div class="frame">${buildSprite(SPRITES[SPRITE_KEYS[state.i]])}</div></div>`;
  panel.innerHTML = `
    ${hero}
    <div class="topbar"><span>The Armour of God</span><span>${state.i+1} / ${QUESTIONS.length}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    ${art}
    <div class="qnum">Question ${state.i+1}</div>
    <div class="question">${item.q}</div>
    <div class="opts">
      ${item.o.map((opt,idx)=>`
        <button class="opt" style="animation-delay:${idx*70}ms" onclick="choose(${idx})">
          <span class="key">${KEYS[idx]}</span><span>${opt.t}</span>
        </button>`).join('')}
    </div>`;
  requestAnimationFrame(()=>{ panel.querySelector('.fill').style.width = (Math.round((state.i+1)/QUESTIONS.length*100))+'%'; });
}

function choose(idx){
  const pts = QUESTIONS[state.i].o[idx].p;
  for(const piece in pts){
    state.scores[piece]+=pts[piece];
    if(state.first[piece]===undefined) state.first[piece]=state.i; // earliest question scored
  }
  state.i++;
  swap(()=>{ if(state.i<QUESTIONS.length) render(); else showResult(); });
}

function winner(){
  // normalize by each piece's own maximum, then tiebreak by earliest scored, then fixed priority
  let best=null, bestPct=-1;
  for(const piece in state.scores){
    const p = state.scores[piece]/MAX[piece];
    if(p>bestPct+1e-9){ bestPct=p; best=piece; }
    else if(Math.abs(p-bestPct)<=1e-9){
      const a=state.first[best], b=state.first[piece];
      const fa = a===undefined?99:a, fb = b===undefined?99:b;
      if(fb<fa) best=piece;
      else if(fb===fa && TIEBREAK.indexOf(piece)<TIEBREAK.indexOf(best)) best=piece;
    }
  }
  return best;
}

function showResult(){
  const key = winner();
  const c = PIECES[key];
  panel.className='panel result fadein';
  panel.innerHTML = `
    <div class="emblem">${c.icon}</div>
    <div class="verdict">You wear the</div>
    <div class="piece-name">${c.name}</div>
    <div class="piece-title">&ldquo;${c.title}&rdquo;</div>
    <div class="rarity">🔥 ${RARITY[key]}% are the ${c.name}</div>
    <div class="traits">${c.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div>
    <div class="block"><h4>Your strength</h4><p>${c.strength}</p></div>
    <div class="block"><h4>Your growth edge</h4><p>${c.growth}</p></div>
    <div class="block"><h4>Your verse</h4><p class="verse">&ldquo;${c.verse}&rdquo;<cite>${c.ref}</cite></p></div>
    <div class="block"><h4>You pair well with</h4><div class="pairs">${c.pairs.map(p=>`<span class="pair">${p}</span>`).join('')}</div></div>
    <div class="actions" style="flex-direction:column;align-items:center;gap:16px">
      <div class="share">
        <button class="sbtn" onclick="shareResult('${key}')" title="Share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
          Share
        </button>
        <button class="sbtn" onclick="saveCard('${key}')" title="Save image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>
          Save image
        </button>
        <a class="sbtn wa" href="${waLink(key)}" target="_blank" rel="noopener" title="Share to WhatsApp">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.8.7-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-5.6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2a.4.4 0 0 0 0-.4l-.8-1.9c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1c0 1.2.9 2.4 1 2.6s1.8 2.8 4.4 3.9c1.6.7 2.2.7 3 .6a2.5 2.5 0 0 0 1.7-1.2 2 2 0 0 0 .1-1.2c0-.1-.2-.2-.4-.3z"/></svg>
          WhatsApp
        </a>
        <button class="sbtn" onclick="copyResult('${key}')" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
          Copy
        </button>
      </div>
      <button class="btn ghost" onclick="swap(welcome)">Take it again</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1900);
}

function shareText(key){
  const c=PIECES[key];
  return `I'm the ${c.name} ${c.icon} \u2014 \u201c${c.title}\u201d! Which piece of the Armour of God are you?`;
}
function waLink(key){
  return 'https://wa.me/?text='+encodeURIComponent(shareText(key));
}

function copyResult(key){
  const c=PIECES[key];
  const text=`I'm the ${c.name} ${c.icon} \u2014 "${c.title}"!\n${c.traits.join(' \u00b7 ')}\n\nWhich piece of the Armour of God are you?`;
  const done=()=>toast('Copied to clipboard');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);cb();
}

// ---- shareable image card (canvas → PNG) ----
function roundRect(x,a,b,w,h,r){ x.beginPath();
  x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r);
  x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
function letterText(x,text,cx,y,sp){
  let total=0; for(const ch of text) total+=x.measureText(ch).width+sp; total-=sp;
  let px=cx-total/2; const prev=x.textAlign; x.textAlign='left';
  for(const ch of text){ x.fillText(ch,px,y); px+=x.measureText(ch).width+sp; }
  x.textAlign=prev;
}
function wrapText(x,text,cx,y,maxW,lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(x.measureText(t).width>maxW && line){ x.fillText(line,cx,yy); line=w; yy+=lh; }
    else line=t; }
  x.fillText(line,cx,yy); return yy;
}
async function makeCard(key){
  const c=PIECES[key], W=1080, H=1350;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  try{ await document.fonts.ready; await Promise.all([
    document.fonts.load('800 80px Poppins'), document.fonts.load('italic 700 46px Poppins'),
    document.fonts.load('600 26px Poppins'), document.fonts.load('500 30px Inter'),
    document.fonts.load('italic 36px Inter')]); }catch(e){}
  const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#f1eeff');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  const rg=x.createRadialGradient(W/2,-60,40,W/2,-60,820);
  rg.addColorStop(0,'rgba(108,92,231,.16)'); rg.addColorStop(1,'rgba(108,92,231,0)');
  x.fillStyle=rg; x.fillRect(0,0,W,H);
  [['#ff6b6b',150,210,12],['#2ec4b6',930,180,10],['#ffd166',865,330,9],['#6c5ce7',185,330,8]]
    .forEach(function(d){ x.fillStyle=d[0]; x.beginPath(); x.arc(d[1],d[2],d[3],0,Math.PI*2); x.fill(); });
  x.strokeStyle='rgba(108,92,231,.30)'; x.lineWidth=3; roundRect(x,30,30,W-60,H-60,36); x.stroke();
  x.textAlign='center'; x.textBaseline='alphabetic';
  x.fillStyle='#6c5ce7'; x.font='600 26px Poppins'; letterText(x,'THE ARMOUR OF GOD',W/2,134,6);
  const cx=W/2, cy=362, R=150;
  x.fillStyle='#efeaff'; x.beginPath(); x.arc(cx,cy,R,0,Math.PI*2); x.fill();
  x.strokeStyle='rgba(108,92,231,.35)'; x.lineWidth=3; x.beginPath(); x.arc(cx,cy,R,0,Math.PI*2); x.stroke();
  x.font='150px serif'; x.textBaseline='middle'; x.fillText(c.icon,cx,cy+8); x.textBaseline='alphabetic';
  x.fillStyle='#8b86a6'; x.font='500 30px Inter'; x.fillText('You wear the',W/2,580);
  x.fillStyle='#221c3a'; x.font='800 80px Poppins'; const ny=wrapText(x,c.name,W/2,658,W-160,88);
  x.fillStyle='#6c5ce7'; x.font='italic 700 46px Poppins'; x.fillText('\u201c'+c.title+'\u201d',W/2,ny+62);
  x.font='700 30px Poppins';
  const rtxt='\uD83D\uDD25  '+RARITY[key]+'% are the '+c.name;
  const tw=x.measureText(rtxt).width, pw=tw+64, ph=64, px0=W/2-pw/2, py0=ny+102;
  x.fillStyle='#ffe6e6'; roundRect(x,px0,py0,pw,ph,32); x.fill();
  x.fillStyle='#e0495b'; x.textBaseline='middle'; x.fillText(rtxt,W/2,py0+ph/2+2); x.textBaseline='alphabetic';
  x.fillStyle='#6b6678'; x.font='28px Inter'; x.fillText(c.traits.join('   \u00b7   '),W/2,py0+ph+56);
  const dl=py0+ph+94;
  x.strokeStyle='rgba(108,92,231,.20)'; x.lineWidth=1; x.beginPath(); x.moveTo(W/2-260,dl); x.lineTo(W/2+260,dl); x.stroke();
  x.fillStyle='#3a3450'; x.font='italic 36px Inter'; const vy=wrapText(x,'\u201c'+c.verse+'\u201d',W/2,dl+60,W-200,50);
  x.fillStyle='#6c5ce7'; x.font='600 24px Inter'; letterText(x,c.ref.toUpperCase(),W/2,vy+44,2);
  x.fillStyle='#9b95b8'; x.font='600 30px Poppins'; x.fillText('Which piece are you?',W/2,H-92);
  return cv;
}
function canvasToBlob(cv){ return new Promise(r=>cv.toBlob(r,'image/png')); }

async function saveCard(key){
  toast('Creating your card\u2026');
  try{
    const cv=await makeCard(key); const blob=await canvasToBlob(cv);
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='armour-of-god-'+key+'.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000); toast('Image saved');
  }catch(e){ toast('Couldn\u2019t make the image'); }
}
async function shareResult(key){
  const text=shareText(key);
  try{
    const cv=await makeCard(key); const blob=await canvasToBlob(cv);
    const file=new File([blob],'armour-of-god.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text}); return;
    }
    if(navigator.share){ await navigator.share({text}); return; }
  }catch(e){ if(e && e.name==='AbortError') return; }
  copyResult(key);
}

welcome();
</script>
