<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4efe4; --card:#fffdf8; --ink:#2b2540; --muted:#8c8598; --line:#ece3d3; --soft:#f4ecdd;
  --neh:#e2603e; --bar:#1fa78c; --mar:#3b7fd4; --mary:#8166e6; --brand:#5a4fcf;
  --shadow:0 26px 54px -28px rgba(43,37,64,.45);
}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:
    radial-gradient(1100px 600px at 50% -8%, #efe7d6, transparent 60%),
    linear-gradient(180deg,#f7f2e8,#efe6d6);
  background-attachment:fixed; min-height:100%;
  display:flex; flex-direction:column; align-items:center;
  padding:26px 16px 40px; -webkit-font-smoothing:antialiased;
}
.wrap{width:100%; max-width:560px; margin:auto}
.panel{
  position:relative; background:var(--card); border-radius:26px; overflow:hidden;
  padding:clamp(22px,5vw,40px); box-shadow:var(--shadow); text-align:center;
}
.panel::after{content:"";position:absolute;left:0;right:0;top:0;height:5px;
  background:linear-gradient(90deg,var(--neh),var(--bar),var(--mar),var(--mary))}
.fadein{animation:panelIn .5s cubic-bezier(.2,.8,.3,1) both}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.leaving{opacity:0;transform:translateY(-8px);transition:.2s}
h1{font-family:'Lora',serif;font-weight:700;line-height:1.08;color:var(--ink);
  font-size:clamp(2rem,7vw,2.85rem);letter-spacing:-.01em;margin-bottom:2px}
.eyebrow{font-family:'Inter';font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  font-size:.7rem;color:var(--brand)}
.lede{color:#5b556e;font-size:1.04rem;line-height:1.6;margin:16px auto 0;max-width:42ch}
.fine{color:var(--muted);font-size:.82rem;margin-top:18px}
.actions{margin-top:24px;display:flex;justify-content:center}
.btn{font-family:'Inter';font-weight:700;font-size:1rem;color:#fff;border:0;cursor:pointer;
  background:var(--brand);padding:15px 30px;border-radius:99px;transition:transform .14s,filter .14s,box-shadow .14s;
  box-shadow:0 14px 26px -12px rgba(90,79,207,.7)}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;color:var(--brand);box-shadow:inset 0 0 0 2px var(--line)}
.btn.ghost:hover{background:var(--soft)}

/* topbar / progress */
.topbar{display:flex;justify-content:space-between;align-items:center;font-family:'Inter';font-weight:700;
  font-size:.82rem;color:var(--brand);margin-bottom:12px}
.topbar .count{color:var(--muted)}
.bar{height:8px;background:var(--soft);border-radius:99px;overflow:hidden;margin-bottom:22px}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand),var(--mary));
  transition:width .35s cubic-bezier(.4,0,.2,1)}

/* question */
.qtile{width:96px;height:96px;border-radius:24px;margin:0 auto 6px;display:grid;place-items:center;
  font-size:46px;background:var(--soft);box-shadow:inset 0 0 0 1px var(--line)}
.qnum{font-family:'Inter';font-weight:700;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--brand);margin-top:16px}
.question{font-family:'Lora',serif;font-weight:600;font-size:clamp(1.32rem,4.6vw,1.7rem);line-height:1.28;
  color:var(--ink);margin:8px 0 22px}
.opts{display:flex;flex-direction:column;gap:13px;text-align:left}
.opt{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--line);
  border-radius:16px;padding:16px 17px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;
  animation:rise .45s both}
.opt:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:0 12px 24px -16px rgba(90,79,207,.6)}
.opt:active{transform:scale(.99)}
.opt:nth-child(1){animation-delay:.04s}.opt:nth-child(2){animation-delay:.1s}
.opt:nth-child(3){animation-delay:.16s}.opt:nth-child(4){animation-delay:.22s}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.optk{flex:none;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
  font-family:'Inter';font-weight:700;font-size:.95rem;color:var(--brand);background:var(--soft)}
.optt{font-size:1rem;line-height:1.42;color:var(--ink);font-weight:500}

/* forging */
.forge{text-align:center;padding:24px 0 8px}
.forge-ring{width:90px;height:90px;margin:6px auto 24px;border-radius:50%;
  border:7px solid var(--soft);border-top-color:var(--brand);animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.forge-label{font-family:'Lora',serif;font-weight:700;font-size:clamp(1.3rem,5vw,1.7rem)}
.shimmer{background:linear-gradient(90deg,var(--ink),var(--brand),var(--ink));background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:shim 1.3s linear infinite}
@keyframes shim{to{background-position:-200% center}}
.forge-cycle{font-family:'Lora',serif;font-weight:600;color:var(--brand);font-size:1.1rem;height:1.5em;margin-top:12px}
.forge-bar{height:10px;background:var(--soft);border-radius:99px;overflow:hidden;max-width:280px;margin:24px auto 0}
.forge-bar i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--brand),var(--mary),var(--neh));animation:fillbar 1.5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fillbar{to{width:100%}}

/* result */
.result .emblem{width:108px;height:108px;border-radius:50%;margin:0 auto;display:grid;place-items:center;
  font-size:54px;background:var(--soft);box-shadow:inset 0 0 0 2px var(--line);
  animation:revealPop .7s cubic-bezier(.2,.8,.3,1.3) both}
.result .verdict{font-family:'Inter';font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  font-size:.72rem;color:var(--muted);margin-top:18px}
.result .piece-name{font-family:'Lora',serif;font-weight:700;font-size:clamp(1.9rem,6.4vw,2.5rem);line-height:1.08;margin-top:4px}
.result .piece-title{font-family:'Lora',serif;font-style:italic;font-weight:600;font-size:1.12rem;color:var(--brand);margin-top:4px}
.result .traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.result .trait{font-size:.82rem;font-weight:600;padding:6px 13px;border-radius:99px;background:var(--soft);color:#5b556e}
.result .block{text-align:left;border-top:1px solid var(--line);margin-top:18px;padding-top:16px}
.result .block h4{font-family:'Inter';font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  font-size:.72rem;color:var(--brand);margin-bottom:7px}
.result .block p{color:#4c4661;line-height:1.6;font-size:1.01rem}
.verse{font-family:'Lora',serif;font-style:italic;color:var(--ink);font-size:1.08rem;line-height:1.45}
.verse cite{display:block;font-style:normal;font-family:'Inter';font-weight:700;font-size:.74rem;
  letter-spacing:.06em;text-transform:uppercase;color:var(--brand);margin-top:8px}
.result .emblem,.result .verdict,.result .piece-name,.result .piece-title,.result .traits,
.result .block,.result .actions,.result .growth-divider,.result .weak-card{animation:riseIn .5s both}
.result .emblem{animation:revealPop .7s cubic-bezier(.2,.8,.3,1.3) both}
@keyframes revealPop{0%{opacity:0;transform:scale(.4)}60%{opacity:1;transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* growth area / least-natural */
.growth-divider{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.growth-divider::before,.growth-divider::after{content:"";flex:1;height:1px;background:var(--line)}
.growth-divider span{font-family:'Inter';font-weight:700;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.weak-card{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:18px;text-align:left}
.weak-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.weak-emblem{width:48px;height:48px;border-radius:50%;background:var(--card);display:grid;place-items:center;
  font-size:25px;flex:none;box-shadow:inset 0 0 0 2px var(--line)}
.weak-label{font-family:'Inter';font-weight:700;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.weak-name{font-family:'Lora',serif;font-weight:700;font-size:1.08rem;color:var(--ink);line-height:1.2;margin-top:2px}
.weak-tip{font-size:.96rem;line-height:1.55;color:#4c4661;margin:0}
.weak-tip b{color:var(--brand)}

/* share */
.result .actions{flex-direction:column;align-items:center;gap:16px;margin-top:26px}
.share{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%}
.sbtn{display:inline-flex;align-items:center;gap:8px;font-family:'Inter';font-weight:600;font-size:.92rem;
  color:var(--brand);background:var(--soft);border:0;border-radius:13px;padding:12px 16px;cursor:pointer;
  text-decoration:none;transition:transform .12s,filter .12s}
.sbtn:hover{transform:translateY(-1px);filter:brightness(.98)}
.sbtn svg{width:18px;height:18px}
.sbtn.wa{background:#e7f7ed;color:#1c8a4e}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:#fff;font-size:.9rem;font-weight:600;padding:11px 18px;border-radius:99px;
  pointer-events:none;transition:.25s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footnote{text-align:center;color:var(--muted);font-size:.8rem;margin-top:18px;line-height:1.5}

/* welcome cinematic */
.welcome{isolation:isolate}
.welcome>*{position:relative;z-index:1}
.welcome>.aurora{position:absolute;left:0;right:0;top:0;height:300px;z-index:0;pointer-events:none;overflow:hidden}
.welcome .aurora b{position:absolute;width:190px;height:190px;border-radius:50%;filter:blur(46px);opacity:.45;will-change:transform}
.welcome .aurora .b1{background:var(--neh);left:-20px;top:-30px;animation:drift1 13s ease-in-out infinite}
.welcome .aurora .b2{background:var(--bar);right:-20px;top:-10px;animation:drift2 15s ease-in-out infinite}
.welcome .aurora .b3{background:var(--mar);left:34%;top:60px;width:160px;height:160px;animation:drift3 12s ease-in-out infinite}
.welcome .aurora .b4{background:var(--mary);right:16%;top:90px;width:150px;height:150px;animation:drift1 16s ease-in-out infinite reverse}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24px,16px) scale(1.12)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,20px) scale(1.1)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(16px,-14px) scale(1.15)}}
.welcome .spark{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;
  box-shadow:0 0 6px 2px rgba(255,255,255,.85);opacity:0;animation:twinkle 3.4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:.95;transform:scale(1)}}
.hero{position:relative;display:flex;justify-content:center;align-items:flex-end;gap:14px;height:118px;margin:4px 0 18px}
.gem{position:relative;z-index:1;width:62px;height:62px;border-radius:18px;display:grid;place-items:center;font-size:30px;
  background:var(--card);box-shadow:0 14px 26px -12px rgba(43,37,64,.4),inset 0 0 0 1.5px var(--line);
  opacity:0;transform:translateY(16px) scale(.7);animation:gemin .55s cubic-bezier(.2,.8,.3,1.4) both}
.hero .gem:nth-child(1),.hero .gem:nth-child(4){margin-bottom:0}
.hero .gem:nth-child(2),.hero .gem:nth-child(3){margin-bottom:18px}
.gem .halo{position:absolute;inset:-9px;border-radius:20px;z-index:-1;
  background:radial-gradient(closest-side,var(--c),transparent 72%);filter:blur(8px);opacity:.5;animation:halo 3.6s ease-in-out infinite}
@keyframes gemin{to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes halo{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:.7;transform:scale(1.1)}}
.welcome .badge{display:inline-block;margin-top:2px;font-family:'Inter';font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;font-size:.7rem;color:var(--brand);padding:7px 15px;border-radius:99px;
  background:rgba(90,79,207,.1);box-shadow:inset 0 0 0 1px rgba(90,79,207,.2);animation:riseIn .5s .05s both}
.welcome h1{animation:riseIn .55s .15s both}
.welcome .lede{animation:riseIn .55s .28s both}
.welcome .actions{animation:riseIn .55s .42s both}
.welcome .fine{animation:riseIn .5s .55s both}
.welcome .cta{position:relative;overflow:hidden;font-size:1.04rem;padding:16px 32px;
  background:linear-gradient(120deg,var(--brand),#6f63e0 45%,var(--mary));
  box-shadow:0 16px 32px -10px rgba(90,79,207,.6);animation:ctapulse 3.2s ease-in-out infinite}
@keyframes ctapulse{0%,100%{box-shadow:0 16px 30px -12px rgba(90,79,207,.5)}50%{box-shadow:0 20px 42px -8px rgba(129,102,230,.5)}}
.welcome .cta::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg);animation:shine 4.2s ease-in-out infinite}
@keyframes shine{0%,58%{left:-70%}100%{left:170%}}
.welcome .cta .arr{display:inline-block;margin-left:5px;transition:transform .16s}
.welcome .cta:hover .arr{transform:translateX(5px)}

@media(max-width:520px){.panel{padding:24px 20px;border-radius:22px}.sbtn{flex:1 1 auto;justify-content:center;min-width:120px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
/* ===== follow-up funnel card ===== */
.connect{position:relative;overflow:hidden;width:100%;margin-top:8px;border-radius:20px;padding:22px 20px;
  background:linear-gradient(140deg,#fff,var(--soft));border:1px solid var(--line);text-align:center}
.connect-eyebrow{font-family:'Inter',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.66rem;color:var(--brand)}
.connect-title{font-family:'Lora',serif;font-weight:700;font-size:1.26rem;color:var(--ink);margin-top:6px;line-height:1.25}
.connect-sub{color:#5b556e;font-size:.95rem;line-height:1.5;margin:8px auto 16px;max-width:34ch}
.connect-btns{display:flex;flex-direction:column;gap:10px}
.ig-btn,.dm-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:'Inter',sans-serif;
  font-weight:700;font-size:1rem;padding:14px 18px;border-radius:13px;text-decoration:none;color:#fff;
  transition:transform .14s,filter .14s,box-shadow .14s}
.ig-btn{background:linear-gradient(70deg,#f09433,#e6683c 24%,#dc2743 50%,#cc2366 74%,#bc1888);box-shadow:0 12px 26px -12px rgba(220,39,67,.7)}
.dm-btn{background:var(--brand);box-shadow:0 12px 24px -12px rgba(90,79,207,.7)}
.ig-btn:hover,.dm-btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.ig-btn:active,.dm-btn:active{transform:scale(.98)}
.ig-btn svg,.dm-btn svg{width:20px;height:20px}
/* ===== question hero image ===== */
.qhero{width:100%;aspect-ratio:16/9;border-radius:18px;overflow:hidden;margin:2px 0 6px;
  background:var(--soft);border:1px solid var(--line);box-shadow:0 16px 32px -20px rgba(43,37,64,.55)}
.qhero img{width:100%;height:100%;object-fit:cover;display:block}
</style>
</head>
<body>
<div class="wrap"><div class="panel" id="panel"></div>
<p class="footnote">A light-hearted quiz on how you handle conflict · grounded in Scripture, not a verdict on your heart</p></div>
<div class="toast" id="toast"></div>

<script>
// ===== FOLLOW-UP FUNNEL — your Instagram handle (edit here to change) =====
const IG_HANDLE = "nus.navigators";                      // e.g. "gracechurch.sg"
const IG_URL    = "https://instagram.com/" + IG_HANDLE; // opens your profile
const IG_DM     = "https://ig.me/m/" + IG_HANDLE;       // opens a DM straight to you
const ARCH = {
  nehemiah:{ icon:"🧱", name:"The Nehemiah", tag:"The Visionary Driver", color:"#e2603e",
    traits:["direct","decisive","goal-driven"],
    desc:"Like Nehemiah rebuilding the wall, you're direct, goal-oriented, and brilliant at cutting through noise to solve problems. When conflict comes, you run toward it — you want it resolved, fast.",

    shadow:"In your rush to a solution, you can steamroll people's feelings or come across as harsh.",

    step:"In a conflict, make yourself wait five seconds before speaking. Before you offer a solution, ask: “How are you feeling about this?”",
    verse:"So we rebuilt the wall, for the people worked with all their heart.", ref:"Nehemiah 4:6",
    borrow:"their decisiveness — name the goal and just move" },
  barnabas:{ icon:"🪵", name:"The Barnabas", tag:"The Empathetic Peacekeeper", color:"#1fa78c",
    traits:["warm","empathetic","peace-loving"],
    desc:"True to the name Barnabas — “son of encouragement” — you put relationships and harmony above almost everything, and you read the emotional temperature of a room in seconds.",
    power:"Creating safe spaces, comforting the hurting, and bringing warmth into tense moments.",
    shadow:"You hate tension so much you can slip into peace-keeping (avoiding the issue) instead of peace-making (resolving it through honest truth).",
    stepTitle:"Speak the truth in love",
    step:"Holding back your real thoughts to dodge tension is its own kind of hiding. Try: “Because I value our relationship, I need to share something hard…”",
    verse:"He encouraged them all to stay true to the Lord with all their hearts.", ref:"Acts 11:23",
    borrow:"their warmth — really check how people feel, not just what's correct" },
  martha:{ icon:"📋", name:"The Martha", tag:"The Structured Analytical", color:"#3b7fd4",
    traits:["organised","logical","fair"],
    desc:"Like Martha preparing the house, you love order, logic, clear expectations and fairness. In conflict, you reach for the facts, the rules and the data to find the “right” answer.",
    power:"Objective thinking, serious organisation, and an eye for the flaw in a plan before it fails.",
    shadow:"You can grow resentful of people who don't pull their weight or follow the rules — and it leaks out as judgment or passive-aggression.",

    borrow:"their structure — slow down and get the facts straight" },
  mary:{ icon:"🛐", name:"The Mary", tag:"The Internal Processor", color:"#8166e6",
    traits:["reflective","intuitive","wise"],
    desc:"Like Mary at Jesus' feet, you're a deep thinker — reflective, intuitive, and you need time to process internally before you speak.",
    power:"Wisdom, deep intuition, and the ability to see the bigger picture instead of reacting on impulse.",
    shadow:"When tension gets loud, your instinct is to shut down, withdraw, or walk away — leaving everyone else guessing.",
    stepTitle:"The “time-out” message",
    step:"If you need to withdraw, don't just vanish. Say it out loud: “I care about this, but I need an hour to think — can we talk again at 4?”",
    verse:"Mary sat at the Lord's feet, listening to what he said.", ref:"Luke 10:39",
    borrow:"their reflective pause — sit with it before you react" },
};
const ORDER = ["nehemiah","barnabas","martha","mary"];

const QUESTIONS = [
  { q:"A church committee meeting is running an hour over — people keep chatting and nothing's getting decided. You…", tile:"⏰", photo:HERO_Q1,
    o:[ {t:"Politely cut in, restate the goals, and push for a vote so everyone can leave", a:"nehemiah"},
        {t:"Say nothing — quietly help pass out snacks and clear cups to keep things pleasant", a:"barnabas"},
        {t:"Quietly fume that the leader ignored the printed agenda, and mentally check out", a:"martha"},
        {t:"Watch everyone's body language, working out why the group can't connect — but keep it to yourself", a:"mary"} ]},
  { q:"Someone in your small group makes a theological claim you're sure is wrong. You…", tile:"💬",
    o:[ {t:"Speak up and correct them on the spot, so the misinformation doesn't spread", a:"nehemiah"},
        {t:"Stay quiet to keep the peace — you don't want them to feel embarrassed", a:"barnabas"},
        {t:"Switch to study mode — look up the exact verse or commentary to verify first", a:"martha"},
        {t:"Wonder why they see it that way, and maybe offer a gentle, private word later", a:"mary"} ]},
  { q:"You hear through the grapevine that a church friend is upset over something you said. You…", tile:"📱", photo:HERO_Q3,
    o:[ {t:"Call or text them right away to find out what's wrong and fix it now", a:"nehemiah"},
        {t:"Feel sick about it and worry about losing the friendship, hoping it blows over", a:"barnabas"},
        {t:"Replay the whole conversation, analysing your words to see if you broke a rule", a:"martha"},
        {t:"Withdraw for a few days to pray and process, then approach them when it's quiet", a:"mary"} ]},
  { q:"When a conflict gets heated, your biggest temptation is to…", tile:"🔥", photo:HERO_Q4,
    o:[ {t:"Overpower them with logic or intensity until you win the argument", a:"nehemiah"},
        {t:"Agree to things you don't believe just to make the shouting stop", a:"barnabas"},
        {t:"Go cold and a little passive-aggressive, picking at their logical flaws", a:"martha"},
        {t:"Shut down, pull away, and emotionally detach from the whole thing", a:"mary"} ]},
  { q:"At small group, the chat slides into gossip about someone who isn't there — and it's turning unkind. You…", tile:"🗣️",
    o:[ {t:"Cut in directly — call it what it is and steer the group somewhere kinder", a:"nehemiah"},
        {t:"Gently change the subject so nobody's embarrassed and the warmth comes back", a:"barnabas"},
        {t:"Point out that it isn't fair to judge someone who isn't here to speak for themselves", a:"martha"},
        {t:"Stay quiet but uneasy, and resolve to check on that person yourself later", a:"mary"} ]},
  { q:"You're already stretched thin, and someone at church asks you to take on one more big commitment. You…", tile:"✋",
    o:[ {t:"Tell them straight you're at capacity and can't take this one on", a:"nehemiah"},
        {t:"Say yes anyway — you can't stand the thought of letting them down", a:"barnabas"},
        {t:"Lay out everything already on your plate to explain why it isn't reasonable", a:"martha"},
        {t:"Go quiet and avoid them while you work out how to say no without the guilt", a:"mary"} ]},
];

const KEYS = ["A","B","C","D"];
let state = { i:0, scores:{}, first:{} };
ORDER.forEach(k=>state.scores[k]=0);
const panel = document.getElementById('panel');

function swap(fn){ panel.classList.add('leaving'); setTimeout(()=>{ fn(); }, 200); }

function welcome(){
  state = { i:0, scores:{}, first:{} }; ORDER.forEach(k=>state.scores[k]=0);
  panel.className='panel welcome fadein';
  const gems = ORDER.map((k,idx)=>`<span class="gem" style="--c:${ARCH[k].color};animation-delay:${idx*90}ms"><span class="halo"></span>${ARCH[k].icon}</span>`).join('');
  panel.innerHTML = `
    <div class="aurora"><b class="b1"></b><b class="b2"></b><b class="b3"></b><b class="b4"></b>
      <i class="spark" style="left:14%;top:22%;animation-delay:0s"></i>
      <i class="spark" style="left:32%;top:44%;animation-delay:.6s"></i>
      <i class="spark" style="left:52%;top:14%;animation-delay:1.1s"></i>
      <i class="spark" style="left:70%;top:38%;animation-delay:.8s"></i>
      <i class="spark" style="left:86%;top:22%;animation-delay:1.7s"></i>
      <i class="spark" style="left:46%;top:8%;animation-delay:2.3s"></i>
    </div>
    <div class="hero">${gems}</div>
    <div class="badge">✦ A Biblical Communication Quiz</div>
    <h1>How do you handle<br>conflict?</h1>
    <p class="lede">Six everyday church moments. Answer on instinct, and find out whether you meet tension like Nehemiah, Barnabas, Martha, or Mary — and what your next step is.</p>
    <div class="actions"><button class="btn cta" onclick="swap(start)">Find your style <span class="arr">→</span></button></div>
    <p class="fine">Six quick scenarios · about a minute · nothing saved, nothing shared</p>`;
}

function start(){ state.i=0; render(); }

function render(){
  const q = QUESTIONS[state.i];
  panel.className='panel fadein';
  const pct = (state.i/QUESTIONS.length)*100;
  const opts = q.o.map((o,idx)=>`
    <div class="opt" onclick="choose(${idx})">
      <span class="optk">${KEYS[idx]}</span><span class="optt">${o.t}</span>
    </div>`).join('');
  panel.innerHTML = `
    <div class="topbar"><span>Biblical Communication</span><span class="count">${state.i+1} / ${QUESTIONS.length}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    ${q.photo ? `<div class="qhero"><img src="${q.photo}" alt=""></div>` : `<div class="qtile">${q.tile}</div>`}
    <div class="qnum">Scenario ${state.i+1}</div>
    <div class="question">${q.q}</div>
    <div class="opts">${opts}</div>`;
}

function choose(idx){
  const a = QUESTIONS[state.i].o[idx].a;
  state.scores[a] += 1;
  if(state.first[a]===undefined) state.first[a]=state.i;
  state.i++;
  swap(()=>{ if(state.i<QUESTIONS.length) render(); else forging(); });
}

function winner(){
  let best=null, bestPct=-1;
  for(const k of ORDER){
    const p = state.scores[k]/MAX[k];
    if(p>bestPct+1e-9){ bestPct=p; best=k; }
    else if(Math.abs(p-bestPct)<=1e-9){
      const a=state.first[best], b=state.first[k];
      const fa=a===undefined?99:a, fb=b===undefined?99:b;
      if(fb<fa) best=k;
      else if(fb===fa && TIEBREAK.indexOf(k)<TIEBREAK.indexOf(best)) best=k;
    }
  }
  return best;
}

function confetti(){
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:60';
  cv.width=innerWidth; cv.height=innerHeight; document.body.appendChild(cv);
  const x=cv.getContext('2d');
  const cols=['#e2603e','#1fa78c','#3b7fd4','#8166e6','#5a4fcf'];
  const P=[];
  for(let i=0;i<140;i++){ P.push({x:innerWidth/2+(Math.random()-.5)*150, y:innerHeight*0.30,
    vx:(Math.random()-.5)*12, vy:Math.random()*-14-4, g:.34+Math.random()*.12,
    s:6+Math.random()*7, r:Math.random()*6.28, vr:(Math.random()-.5)*.34, c:cols[i%cols.length]}); }
  const start=performance.now();
  (function frame(now){
    x.clearRect(0,0,cv.width,cv.height);
    const fade=Math.max(0,1-(now-start)/2600);
    for(const p of P){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
      x.save(); x.globalAlpha=fade; x.translate(p.x,p.y); x.rotate(p.r);
      x.fillStyle=p.c; x.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.62); x.restore(); }
    if(now-start<2600) requestAnimationFrame(frame); else cv.remove();
  })(performance.now());
}

function shareText(key){
  const c=ARCH[key];
  return `I handle conflict like ${c.name} — ${c.tag}. What's your biblical communication style?`;
}
function waLink(key){ return 'https://wa.me/?text='+encodeURIComponent(shareText(key)+'\n'+location.href); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }
function copyResult(key){ navigator.clipboard.writeText(shareText(key)+'\n'+location.href).then(()=>toast('Copied to clipboard')); }

async function shareResult(key){
  const c=ARCH[key];
  try{
    const blob = await makeCard(key);
    const file = new File([blob],'communication-style.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:c.name, text:shareText(key)}); return;
    }
    if(navigator.share){ await navigator.share({title:c.name, text:shareText(key), url:location.href}); return; }
  }catch(e){}
  copyResult(key);
}
async function saveCard(key){
  const blob = await makeCard(key);
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='communication-style.png'; a.click();
  URL.revokeObjectURL(url); toast('Image saved');
}

async function makeCard(key){
  const c=ARCH[key];
  const W=1080,H=1350, cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  try{ await document.fonts.load('700 60px Lora'); await document.fonts.load('600 30px Inter'); }catch(e){}
  // background
  const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,'#fffdf8'); g.addColorStop(1,'#f1e8d8');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  // top accent bar
  const ab=x.createLinearGradient(0,0,W,0); ab.addColorStop(0,'#e2603e');ab.addColorStop(.33,'#1fa78c');ab.addColorStop(.66,'#3b7fd4');ab.addColorStop(1,'#8166e6');
  x.fillStyle=ab; x.fillRect(0,0,W,14);
  // soft color glow
  x.save(); x.globalAlpha=.16; x.fillStyle=c.color;
  x.beginPath(); x.arc(W/2,300,260,0,7); x.fill(); x.restore();
  const cx=W/2;
  // emblem circle
  x.fillStyle='#fffdf8'; x.beginPath(); x.arc(cx,300,120,0,7); x.fill();
  x.lineWidth=5; x.strokeStyle=c.color+'55'; x.stroke();
  x.font='110px serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(c.icon,cx,308);
  // labels
  x.fillStyle='#8c8598'; x.font='700 30px Inter, sans-serif'; x.textBaseline='alphabetic';
  x.fillText('YOU HANDLE CONFLICT LIKE'.split('').join('\u200a'),cx,500);
  x.fillStyle=c.color; x.font='700 84px Lora, serif'; x.fillText(c.name,cx,590);
  x.fillStyle='#2b2540'; x.font='italic 600 42px Lora, serif'; x.fillText(c.tag,cx,650);
  // traits row
  x.font='600 30px Inter, sans-serif'; let tx=cx; const traits=c.traits;
  const gap=22; const widths=traits.map(t=>x.measureText(t).width+54);
  let total=widths.reduce((a,b)=>a+b,0)+gap*(traits.length-1); let sx=cx-total/2;
  traits.forEach((t,i)=>{ const wch=widths[i]; roundRect(x,sx,700,wch,56,28); x.fillStyle='#f3ecdf'; x.fill();
    x.fillStyle='#5b556e'; x.fillText(t,sx+wch/2,737); sx+=wch+gap; });
  // superpower
  x.fillStyle=c.color; x.font='700 28px Inter, sans-serif'; x.fillText('SUPERPOWER',cx,840);
  x.fillStyle='#3a3550'; x.font='400 38px Inter, sans-serif';
  wrap(x, c.power, cx, 895, 880, 50);
  // next step
  x.fillStyle=c.color; x.font='700 28px Inter, sans-serif'; x.fillText('NEXT STEP',cx,1080);
  x.fillStyle='#3a3550'; x.font='400 36px Inter, sans-serif';
  wrap(x, stripQuotes(c.stepTitle)+'.', cx, 1135, 880, 48);
  // footer
  x.fillStyle='#8c8598'; x.font='600 30px Inter, sans-serif';
  x.fillText('The Biblical Communication & Conflict Quiz',cx,1300);
  return await new Promise(res=>cv.toBlob(res,'image/png'));
}
function roundRect(x,a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
function stripQuotes(s){ return s.replace(/[“”]/g,''); }
function wrap(x,text,cx,y,maxw,lh){
  const words=text.split(' '); let line='', yy=y;
  for(const wd of words){ const test=line?line+' '+wd:wd;
    if(x.measureText(test).width>maxw && line){ x.fillText(line,cx,yy); line=wd; yy+=lh; } else line=test; }
  x.fillText(line,cx,yy);
}
